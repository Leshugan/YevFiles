name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons
        run: npx @capacitor/assets generate --android --assetPath resources

      - name: Add Android permissions
        run: |
          MAN=android/app/src/main/AndroidManifest.xml
          if ! grep -q "MANAGE_EXTERNAL_STORAGE" "$MAN"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />\n\n    <application#' "$MAN"
          fi
          # доступ к файлам в legacy-режиме (Android 10)
          sed -i 's#<application #<application android:requestLegacyExternalStorage="true" #' "$MAN"
          # старый back-callback, чтобы кнопка/жест «Назад» доходили до приложения
          sed -i 's#<application #<application android:enableOnBackInvokedCallback="false" #' "$MAN"
          # FileProvider для открытия файлов сторонними приложениями
          if ! grep -q "appsfp" "$MAN"; then
            sed -i 's#</application>#    <provider android:name="androidx.core.content.FileProvider" android:authorities="${applicationId}.appsfp" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/apps_file_paths" /></provider>\n    </application>#' "$MAN"
          fi
          echo "----- manifest -----"
          grep -E "uses-permission|requestLegacy|appsfp" "$MAN" || true

      - name: Install native Apps plugin
        run: |
          PKG=android/app/src/main/java/leshugan/fm
          mkdir -p "$PKG" android/app/src/main/res/xml
          cp native/AppsPlugin.java "$PKG/AppsPlugin.java"
          cp native/MainActivity.java "$PKG/MainActivity.java"
          cp native/apps_file_paths.xml android/app/src/main/res/xml/apps_file_paths.xml
          echo "native files:" && ls -la "$PKG"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/uc.jks" \
            -Pandroid.injected.signing.store.password="updatechecker" \
            -Pandroid.injected.signing.key.alias="uc" \
            -Pandroid.injected.signing.key.password="updatechecker"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: files-apk
          path: android/app/build/outputs/apk/release/*.apk
