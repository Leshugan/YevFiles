name: Build APK
run-name: "🔨 Сборка APK YevFiles"

on:
  push:
    branches: [main, master]
    paths:
      - '*.zip'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Распаковать архив проекта в корень
        run: |
          set -e
          # В корне репозитория лежит только этот workflow + архив проекта (*.zip, имя любое).
          ARCH=$(ls *.zip 2>/dev/null | head -1)
          if [ -z "$ARCH" ]; then
            echo "::error::Не найден архив проекта (*.zip) в корне репозитория"; exit 1
          fi
          echo "Распаковываю $ARCH"
          unzip -o -q "$ARCH" -d _extracted
          INNER=$(find _extracted -maxdepth 1 -mindepth 1 -type d | head -1)
          if [ -n "$INNER" ] && [ -f "$INNER/package.json" ]; then SRC="$INNER"; else SRC=_extracted; fi
          shopt -s dotglob
          for item in "$SRC"/*; do
            name=$(basename "$item")
            [ "$name" = ".github" ] && continue
            rm -rf "./$name"
            cp -r "$item" "./$name"
          done
          shopt -u dotglob
          rm -rf _extracted
          rm -f "$ARCH"
          if [ ! -f package.json ]; then echo "::error::В архиве нет package.json — не тот архив?"; exit 1; fi
          echo "=== корень после распаковки ===" && ls -la

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Кэш Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: |
          set -e
          rm -rf android            # снести любую старую платформу — иначе cap add пропустит свежую сборку
          rm -f capacitor.config.ts # на всякий случай убрать старый TS-конфиг (в архиве только JSON)
          npx cap add android
          npx cap copy android      # принудительно скопировать свежий web-бандл (dist) в ассеты
          {
            echo "org.gradle.caching=true"
            echo "org.gradle.parallel=true"
            echo "org.gradle.configureondemand=true"
            echo "org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8"
          } >> android/gradle.properties
          # zip4j — для архивов с паролем, junrar — для RAR
          GR=android/app/build.gradle
          if ! grep -q "zip4j" "$GR"; then
            sed -i "0,/dependencies {/s//dependencies {\n    implementation 'net.lingala.zip4j:zip4j:2.11.5'\n    implementation 'com.github.junrar:junrar:7.5.5'/" "$GR"
          fi
          grep -n "zip4j\|junrar" "$GR" || true

      - name: Generate app icons
        run: |
          # Рендерим icon.svg (собран из наших же глифов) в icon.png через sharp
          if [ -f resources/icon.svg ]; then
            npm i -g sharp-cli >/dev/null 2>&1 || npm i sharp >/dev/null 2>&1 || true
            node -e "const s=require('sharp');s('resources/icon.svg',{density:300}).resize(1024,1024).png().toFile('resources/icon.png').then(()=>console.log('svg->png ok')).catch(e=>{console.log('render skip:',e.message)})" || echo "sharp render skipped, using existing icon.png"
          fi
          npx @capacitor/assets generate --android --assetPath resources

      - name: Add Android permissions
        run: |
          set -e
          MAN=android/app/src/main/AndroidManifest.xml
          if ! grep -q "MANAGE_EXTERNAL_STORAGE" "$MAN"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_SETTINGS" />\n\n    <application#' "$MAN"
          fi
          # доступ к файлам в legacy-режиме (Android 10)
          sed -i 's#<application #<application android:requestLegacyExternalStorage="true" #' "$MAN"
          # старый back-callback, чтобы кнопка/жест «Назад» доходили до приложения
          sed -i 's#<application #<application android:enableOnBackInvokedCallback="false" #' "$MAN"
          # FileProvider для открытия файлов сторонними приложениями
          if ! grep -q "appsfp" "$MAN"; then
            sed -i 's#</application>#    <provider android:name="leshugan.fm.AppsFileProvider" android:authorities="${applicationId}.appsfp" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/apps_file_paths" /></provider>\n    </application>#' "$MAN"
          fi
          # DocumentsProvider — приложение в системных пикерах "Сохранить в..." / "Открыть"
          if ! grep -q "YevDocumentsProvider" "$MAN"; then
            sed -i 's#</application>#    <provider android:name="leshugan.fm.YevDocumentsProvider" android:authorities="${applicationId}.documents" android:exported="true" android:grantUriPermissions="true" android:permission="android.permission.MANAGE_DOCUMENTS"><intent-filter><action android:name="android.content.action.DOCUMENTS_PROVIDER" /></intent-filter></provider>\n    </application>#' "$MAN"
          fi
          # Приём "Поделиться" (ACTION_SEND) — метка "Сохранить в..."
          if ! grep -q "android.intent.action.SEND" "$MAN"; then
            sed -i 's#</activity>#<intent-filter android:label="Сохранить в..."><action android:name="android.intent.action.SEND" /><category android:name="android.intent.category.DEFAULT" /><data android:mimeType="*/*" /></intent-filter><intent-filter android:label="Сохранить в..."><action android:name="android.intent.action.SEND_MULTIPLE" /><category android:name="android.intent.category.DEFAULT" /><data android:mimeType="*/*" /></intent-filter></activity>#' "$MAN"
          fi
          # Один пункт "Открыть с помощью": иконка приложения + метка "Сохранить/Открыть"
          if ! grep -q "leshugan.fm.OpenSave" "$MAN"; then
            sed -i 's#</application>#<activity-alias android:name="leshugan.fm.OpenSave" android:targetActivity="leshugan.fm.MainActivity" android:exported="true" android:label="Взаимодействовать"><intent-filter><action android:name="android.intent.action.VIEW" /><action android:name="android.intent.action.EDIT" /><category android:name="android.intent.category.DEFAULT" /><data android:scheme="content" /><data android:mimeType="*/*" /></intent-filter></activity-alias></application>#' "$MAN"
          fi
          # OAuth redirect (Google) → MainActivity
          if ! grep -q "com.googleusercontent.apps.589335091963" "$MAN"; then
            sed -i 's#</activity>#<intent-filter><action android:name="android.intent.action.VIEW" /><category android:name="android.intent.category.DEFAULT" /><category android:name="android.intent.category.BROWSABLE" /><data android:scheme="com.googleusercontent.apps.589335091963-6n9ss077f7htshue4vd288eb2t2jduhb" /></intent-filter></activity>#' "$MAN"
          fi
          echo "----- manifest -----"
          grep -E "uses-permission|requestLegacy|appsfp|YevDocuments|action.SEND|yevview" "$MAN" || true

      - name: Install native Apps plugin
        run: |
          set -e
          PKG=android/app/src/main/java/leshugan/fm
          mkdir -p "$PKG" android/app/src/main/res/xml
          cp native/AppsPlugin.java "$PKG/AppsPlugin.java"
          cp native/AppsFileProvider.java "$PKG/AppsFileProvider.java"
          cp native/MainActivity.java "$PKG/MainActivity.java"
          cp native/YevDocumentsProvider.java "$PKG/YevDocumentsProvider.java"
          cp native/apps_file_paths.xml android/app/src/main/res/xml/apps_file_paths.xml
          # переопределяем пути провайдера Capacitor (.fileprovider) на наши (весь storage),
          # чтобы редактор/шаринг получали доступ к любым путям через уже зарегистрированный провайдер
          cp native/apps_file_paths.xml android/app/src/main/res/xml/file_paths.xml
          echo "native files:" && ls -la "$PKG"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --build-cache \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/uc.jks" \
            -Pandroid.injected.signing.store.password="updatechecker" \
            -Pandroid.injected.signing.key.alias="uc" \
            -Pandroid.injected.signing.key.password="updatechecker"

      - name: Upload APK (артефакт)
        id: upload_artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: YevFiles_Compiled
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 5

      - name: Выложить APK в релиз (если квота артефактов исчерпана)
        if: steps.upload_artifact.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          TAG=apk-latest
          NOTES="Автосборка #${{ github.run_number }} от $(date -u +'%Y-%m-%d %H:%M UTC') — выложено в релиз, т.к. квота артефактов исчерпана."
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$REPO" --notes "$NOTES"
          else
            gh release create "$TAG" --repo "$REPO" --title "YevFiles_Compiled" --notes "$NOTES"
          fi
          gh release upload "$TAG" "$APK" --repo "$REPO" --clobber
          echo "::notice::Квота артефактов исчерпана — APK в релизе $TAG"

  cleanup:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old runs and APKs (keep last 10 successful)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          WF=build.yml
          echo "Оставляем 10 последних успешных запусков:"
          KEEP=$(gh run list --repo "$REPO" --workflow "$WF" --status success --limit 10 --json databaseId --jq '.[].databaseId')
          echo "$KEEP"
          echo "Удаляем остальные запуски и их APK:"
          gh run list --repo "$REPO" --workflow "$WF" --limit 300 --json databaseId --jq '.[].databaseId' | while read -r id; do
            [ "$id" = "$GITHUB_RUN_ID" ] && continue
            if ! printf '%s\n' "$KEEP" | grep -qx "$id"; then
              gh api -X DELETE "repos/$REPO/actions/runs/$id" >/dev/null 2>&1 && echo "удалён $id" || true
            fi
          done
